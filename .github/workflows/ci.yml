name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-desktop-server:
    name: Android, desktop, and server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build and test
        run: >-
          ./gradlew --no-daemon --stacktrace
          :app:androidApp:assembleDebug
          :app:sharedUI:testAndroidHostTest
          :app:sharedLogic:testAndroidHostTest
          :app:sharedUI:jvmTest
          :app:sharedLogic:jvmTest
          :server:test

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Set up Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build shared Kotlin/JS library
        run: ./gradlew --no-daemon --stacktrace :app:sharedLogic:jsBrowserDevelopmentLibraryDistribution

      - name: Install web dependencies
        run: npm ci

      - name: Build web application
        run: npm run build -w webApp

  ios:
    name: iOS
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run iOS simulator tests
        run: ./gradlew --no-daemon --stacktrace :app:sharedLogic:iosSimulatorArm64Test
